## Baseline (language-agnostic)

- **Parameterize everything** â€” every dynamic query is parameter-bound; never string-concatenate untrusted input into SQL / predicates.
- **Indexing** â€” hot WHERE / ORDER BY columns are indexed; composite-index column order matches the predicate.
- **No N+1** â€” fetch related rows via eager loading / batch fetch, not a query inside a loop.
- **Transactions** â€” wrap multi-step writes in one transaction; update rows in a consistent order to avoid deadlocks.
- **Reversible migrations** â€” every migration has a working down / rollback path.
- **Query plans** â€” sample EXPLAIN / the query plan for complex queries; watch for full table scans.

## Checklist

- [ ] All dynamic SQL parameter-bound
- [ ] No N+1 (use `with()` eager load)
- [ ] Hot WHERE/ORDER BY columns indexed; composite order matches predicate
- [ ] Multi-step writes wrapped in transaction; consistent row update order
- [ ] Migration has DOWN; uses bound params
- [ ] EXPLAIN sampled for complex queries (no full table scan)

