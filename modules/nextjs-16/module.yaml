name: nextjs-16
display_name: "Next.js 16"
version: 0.1.0
description: "Next.js 16 — current stable major (now at 16.2.x). Turbopack is the default bundler for both dev and build (no --turbopack flag needed; --webpack opts out). next lint removed — bring your own ESLint/Biome CLI. AMP support fully removed. next/image priority deprecated for preload. serverRuntimeConfig/publicRuntimeConfig removed. next upgrade CLI added in 16.1. Requires Node.js 20.9+ and TypeScript 5.1+. Supports React 18.2+ or 19 — React 19 is recommended but NOT required (a React 18.2+ app adopts 16 without a React major upgrade). Biggest code-level break: params/searchParams/cookies/headers/draftMode are now async-only."
requires: []
triggers:
  frontend:
    # A file containing JSX must be .jsx or .tsx (TypeScript/Babel will not
    # parse JSX in .ts/.js), so components are caught by extension wherever
    # they live; .ts/.js utilities, hooks, config and build tooling are
    # scoped to app source roots so repo-root config/scripts stop arming
    # the gate.
    # Two known gaps in this scoping, both fixed the same way: plain-JS React
    # projects (Create React App among them) do put JSX in .js files, caught
    # here only by convention that they live under src/; and Next.js
    # middleware.ts / instrumentation.ts sit at the project root, outside
    # every declared path. A project with either an unconventional JSX
    # location or root-level Next.js entry files opts in via the fe: prefix
    # of the review_trigger_extra_paths userConfig.
    extensions: [".jsx", ".tsx"]
    paths: [app/, pages/, src/, components/, lib/, hooks/, styles/]
provides:
  skills: [nextjs-16-notes]
  references: []
