name: react-19
display_name: "React 19"
version: 0.1.0
description: "React 19 (December 2024) — Actions and async transitions, new hooks (useActionState/useOptimistic/useFormStatus and the use() API), ref as a regular prop (forwardRef no longer needed), <Context> as a provider, document metadata hoisting (<title>/<meta>/<link>), stylesheet + async-script precedence, resource preloading (preload/preinit), and stable Server Components / Server Actions. Removes long-deprecated APIs (ReactDOM.render/hydrate/unmountComponentAtNode, propTypes/defaultProps on function components, legacy Context, string refs). Recommended but NOT required for Next.js 16 (React 18.2+ also works). Pair cross-stack with a nextjs-<version> module, or use standalone for any non-Next React app."
requires: []
triggers:
  frontend:
    # A file containing JSX must be .jsx or .tsx (TypeScript/Babel will not
    # parse JSX in .ts/.js), so components are caught by extension wherever
    # they live; .ts/.js utilities, hooks, config and build tooling are
    # scoped to app source roots so repo-root config/scripts stop arming
    # the gate.
    # Two known gaps in this scoping, both fixed the same way: plain-JS React
    # projects (Create React App among them) do put JSX in .js files, caught
    # here only by convention that they live under src/; and Next.js
    # middleware.ts / instrumentation.ts sit at the project root, outside
    # every declared path. A project with either an unconventional JSX
    # location or root-level Next.js entry files opts in via the fe: prefix
    # of the review_trigger_extra_paths userConfig.
    extensions: [".jsx", ".tsx"]
    paths: [app/, pages/, src/, components/, lib/, hooks/, styles/]
provides:
  skills: [react-19-notes]
  references: []
