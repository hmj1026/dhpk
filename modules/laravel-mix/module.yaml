    extensions: []
    paths: []
  db:
    extensions: []
    paths: []
  sec:
    extensions: []
    paths: []
  frontend:
    extensions: [".js"]
    paths: [resources/assets/]
provides:
  skills: [laravel-mix-notes]
  references: []
