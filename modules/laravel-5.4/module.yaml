description: "Laravel 5.4 (February 2017). PHP 5.6.4+ floor. Signature features: Blade components & slots (first introduced here), implicit/explicit route model binding, web/api middleware groups, realtime facades, markdown mailables, Collection higher-order messages, Laravel Dusk, resource routes. Frontend scaffolding moved from Elixir to Laravel Mix (webpack). Pair with php-5.6 module for the language baseline."
