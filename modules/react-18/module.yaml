name: react-18
display_name: "React 18"
version: 0.1.0
description: "React 18 (March 2022) — createRoot/hydrateRoot (react-dom/client), automatic batching across promises/timeouts/native handlers, opt-in concurrent features (startTransition/useTransition/useDeferredValue), streaming SSR (renderToPipeableStream + selective hydration), and new hooks (useId/useSyncExternalStore/useInsertionEffect). StrictMode double-invokes effects in dev. React 18.2+ is the minimum Next.js 16 supports and one side of Next.js 15.5's React 18/19 dual support. Pair cross-stack with a nextjs-<version> module, or use standalone for any non-Next React app."
requires: []
triggers:
  frontend:
    # A file containing JSX must be .jsx or .tsx (TypeScript/Babel will not
    # parse JSX in .ts/.js), so components are caught by extension wherever
    # they live; .ts/.js utilities, hooks, config and build tooling are
    # scoped to app source roots so repo-root config/scripts stop arming
    # the gate.
    # Two known gaps in this scoping, both fixed the same way: plain-JS React
    # projects (Create React App among them) do put JSX in .js files, caught
    # here only by convention that they live under src/; and Next.js
    # middleware.ts / instrumentation.ts sit at the project root, outside
    # every declared path. A project with either an unconventional JSX
    # location or root-level Next.js entry files opts in via the fe: prefix
    # of the review_trigger_extra_paths userConfig.
    extensions: [".jsx", ".tsx"]
    paths: [app/, pages/, src/, components/, lib/, hooks/, styles/]
provides:
  skills: [react-18-notes]
  references: []
