name: yii-1.1
display_name: "Yii 1.1 Framework"
version: 0.1.0
description: "Yii 1.1 framework: alias-based autoload, CActiveRecord / CDbCriteria, controllers + accessRules, CHtml::encode for XSS, PDO::PARAM bindings. Assumes a PHP baseline module (php-5.6 or php-7.x) is also enabled. Add project-specific repository / service / DDD paths via review_trigger_extra_paths."
requires: [php-5.6]
triggers:
  code:
    extensions: [".php"]
    paths: [protected/]
  db:
    extensions: [".sql"]
    paths: [protected/migrations/, protected/models/]
  sec:
    extensions: []
    paths: [protected/controllers/]
provides:
  skills: [php56-yii-dev, yii1-security-audit]
  commands: [yii1-security-audit]
  references: [framework.md, patterns.md, security.md]
